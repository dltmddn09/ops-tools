<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>빌드 브랜치 타임라인</title>
<style>
  :root {
    --hdr-bg: #1F2D3D;
    --ink: #23303B;
    --border: #CCCCCC;
    --empty: #F7F7F7;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: #EDF0F3; color: var(--ink);
    font-family: "Malgun Gothic", "Segoe UI", Arial, sans-serif; font-size: 14px;
  }

  /* 상단 바 */
  #topbar {
    display: flex; align-items: center; gap: 12px;
    background: var(--hdr-bg); color: #fff; padding: 10px 16px;
  }
  #title-bar { font-size: 17px; font-weight: 700; flex: 1; }
  #edit-toggle {
    background: #3D5166; color: #fff; border: 1px solid #56708C;
    padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  #edit-toggle:hover { background: #4A6076; }

  #draft-banner {
    background: #FFF8E1; border-bottom: 1px solid #E6D9A8; padding: 8px 16px;
    display: flex; gap: 10px; align-items: center; font-size: 13px;
  }
  #draft-banner[hidden] { display: none; }
  #draft-banner button {
    padding: 3px 10px; border: 1px solid #BBA; background: #fff;
    border-radius: 4px; cursor: pointer;
  }

  /* 레이아웃: 그리드 + 편집 패널 */
  #main { display: flex; align-items: flex-start; }
  #grid-wrap {
    flex: 1; overflow: auto; padding: 14px;
    max-height: calc(100vh - 52px);
  }
  #editor {
    display: none; width: 460px; max-width: 46vw; flex-shrink: 0;
    background: #fff; border-left: 1px solid #D5DAE0;
    max-height: calc(100vh - 52px); overflow-y: auto; padding: 14px 16px 40px;
  }
  body.editing #editor { display: block; }

  /* 타임라인 그리드 */
  table.grid {
    border-collapse: separate; border-spacing: 0;
    background: #fff; box-shadow: 0 1px 4px rgba(20,30,40,.12);
  }
  table.grid th, table.grid td {
    border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
    text-align: center; vertical-align: middle; white-space: nowrap;
    min-width: 46px; padding: 0 3px; height: 26px; font-size: 12px;
  }
  table.grid tr > *:first-child {
    border-left: 1px solid var(--border);
    position: sticky; left: 0; z-index: 2;
    min-width: 96px; background: #ECECEC;
  }
  table.grid tr:first-child > * { border-top: 1px solid var(--border); }

  .hdr-row th { position: sticky; top: 0; z-index: 3; }
  .hdr-row2 th { position: sticky; top: 26px; z-index: 3; }
  .hdr-row th:first-child, .hdr-row2 th:first-child { z-index: 4; }
  th.hdr { color: #fff; font-weight: 700; }
  th.corner { background: var(--hdr-bg); font-size: 11px; }
  th.hdr-a { background: #2C3E50; }
  th.hdr-b { background: #3D5166; }
  th.hdr-weekend { background: #4A4A5A; }
  th.hdr-patch { background: #C62828; }

  th.lane-label { color: #fff; font-weight: 700; height: 32px; font-size: 13px; }
  th.bridge-label, th.patch-label { background: #F0F0F0; height: 22px; }
  .bridge-row td, .patch-row td { height: 22px; font-size: 11px; }

  td.seg { font-weight: 700; color: #333; cursor: default; }
  td.seg:hover, td.bridge-ev:hover, td.patch-ev:hover { outline: 2px solid #35506B; outline-offset: -2px; }
  td.empty { background: var(--empty); }
  td.bridge-ev { font-weight: 700; color: #1A1A1A; font-size: 11px; }
  td.patch-ev { color: #CC0000; background: #FFF3F3; font-weight: 700; font-size: 11px; }

  /* 툴팁 */
  #tooltip {
    position: fixed; z-index: 50; pointer-events: none;
    background: rgba(28, 38, 50, .95); color: #fff;
    padding: 7px 10px; border-radius: 6px; font-size: 12px;
    white-space: pre-line; max-width: 280px; line-height: 1.45;
  }

  /* 캘린더 직접 편집 (편집 모드에서만) */
  body.editing td[data-bridge-new], body.editing td[data-patch-new],
  body.editing td[data-branch-idx], body.editing td[data-patch-idx],
  body.editing td.seg { cursor: pointer; }
  body.editing td[data-bridge-new]:hover, body.editing td[data-patch-new]:hover {
    outline: 2px dashed #7A93AC; outline-offset: -2px; background: #EDF3F9;
  }
  .cell-input {
    width: 100%; min-width: 90px; box-sizing: border-box;
    font-size: 11px; padding: 2px 3px; border: 1px solid #35506B; border-radius: 2px;
  }

  /* 팝오버 */
  #popover {
    position: fixed; z-index: 60; background: #fff;
    border: 1px solid #C3CBD4; border-radius: 8px;
    box-shadow: 0 6px 24px rgba(20, 30, 40, .22);
    padding: 12px 14px; min-width: 250px; font-size: 12px;
  }
  #popover[hidden] { display: none; }
  #popover h4 { margin: 0 0 10px; font-size: 12px; color: #35506B; }
  #popover .ed-field input, #popover .ed-field select {
    padding: 4px 6px; border: 1px solid #C8CED6; border-radius: 4px; font-size: 12px; flex: 1;
  }
  #popover .ed-field label { width: 110px; }
  .pop-actions { display: flex; gap: 8px; margin-top: 10px; justify-content: flex-end; }

  /* 편집 패널 */
  #editor h2 { margin: 4px 0 12px; font-size: 16px; }
  .ed-section {
    border: 1px solid #E2E6EA; border-radius: 8px;
    padding: 10px 12px; margin-bottom: 14px; background: #FAFBFC;
  }
  .ed-section h3 {
    margin: 0 0 10px; font-size: 13px; color: #35506B;
    border-bottom: 1px solid #E2E6EA; padding-bottom: 6px;
  }
  .ed-field { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .ed-field label { width: 96px; font-size: 12px; color: #556; flex-shrink: 0; }
  .ed-field input { flex: 1; }
  .ed-item {
    display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap;
  }
  .ed-item input, .ed-item select, .ed-field input {
    padding: 4px 6px; border: 1px solid #C8CED6; border-radius: 4px; font-size: 12px;
  }
  .ed-item input[type=color] { padding: 1px 2px; width: 40px; height: 26px; }
  .w-name { width: 110px; }
  .w-ver { width: 130px; }
  .ver-name { font-weight: 700; font-size: 12px; }
  .ver-mode { font-size: 11px; color: #889; }
  .ed-btn {
    padding: 4px 10px; border: 1px solid #C8CED6; background: #fff;
    border-radius: 4px; cursor: pointer; font-size: 12px;
  }
  .ed-btn:hover { background: #F0F3F6; }
  .ed-btn.danger { color: #B3261E; border-color: #E3B4B0; }
  .ed-btn.add { margin-top: 4px; border-style: dashed; color: #35506B; }
  .ed-btn.primary { background: #1F4E79; color: #fff; border-color: #1F4E79; font-weight: 700; }
  .ed-btn.primary:hover { background: #2A628F; }
  .ed-hint { font-size: 11px; color: #778; line-height: 1.5; margin: 6px 0; }
  .ed-hint-top {
    background: #EDF3F9; border: 1px solid #CDDBE8; border-radius: 6px;
    padding: 8px 10px; margin-bottom: 12px; color: #35506B;
  }
  .ed-item { border-radius: 4px; padding: 4px 6px; }
  details.past-events { margin: 6px 0; }
  details.past-events summary {
    cursor: pointer; font-size: 12px; color: #567; padding: 4px 0;
  }
  details.past-events summary:hover { color: #1F4E79; }
  .ed-warn {
    background: #FDECEA; border: 1px solid #F2B8B5; color: #8C1D18;
    border-radius: 6px; padding: 8px 10px; font-size: 12px; margin-bottom: 12px; line-height: 1.5;
  }
</style>
</head>
<body>
  <div id="topbar">
    <div id="title-bar">빌드 브랜치 타임라인</div>
    <button id="edit-toggle" type="button">⚙ 편집</button>
  </div>
  <div id="draft-banner" hidden>
    이 브라우저에 임시 저장된 편집본이 있습니다.
    <button id="draft-load" type="button">불러오기</button>
    <button id="draft-discard" type="button">삭제</button>
  </div>
  <div id="main">
    <div id="grid-wrap"></div>
    <aside id="editor">
      <h2>타임라인 편집</h2>
      <div id="editor-body"></div>
    </aside>
  </div>
  <div id="tooltip" hidden></div>
  <div id="popover" hidden></div>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
